<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Order Placed | Glamtreasure</title>
  <meta name="description" content="Your Glamtreasure order has been placed successfully." />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav-shell">
      <a class="brand" href="index.html"><img src="assets/images/logo.svg" alt="Glamtreasure logo" /><span>Glamtreasure</span></a>
      <button class="menu-toggle" aria-label="Toggle menu" aria-expanded="false">Menu</button>
      <nav class="main-nav" aria-label="Main navigation">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="bookings.html">Bookings</a></li>
          <li><a href="shop.html">Shop</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
      <div class="header-actions"><a href="account.html">Account</a><a href="cart.html">Cart (0)</a></div>
    </div>
  </header>
  <main>
    <section class="section section-tight">
      <div class="container">
        <div class="account-card order-success-card">
          <div class="burst-wrap" data-burst-wrap aria-hidden="true"></div>
          <p class="breadcrumb">Checkout / Order Placed</p>
          <h1 class="section-title" style="margin-bottom:0.5rem;">Order Placed Successfully</h1>
          <p class="section-subtitle">Your booking has been saved. We will update tracking from the admin panel.</p>
          <p class="form-status" data-order-success-status></p>
          <div data-order-success-summary></div>
          <div class="history-list" data-order-success-items></div>
          <div class="booking-meta-row" style="margin-top:1rem;">
            <a class="btn btn-primary" href="bookings.html">Track Booking</a>
            <a class="btn btn-outline" href="shop.html">Continue Shopping</a>
          </div>
        </div>
      </div>
    </section>
  </main>
  <script src="assets/js/loader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/tracking.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/order-success.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
